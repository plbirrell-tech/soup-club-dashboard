<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Soup Club – Outreach Dashboard</title>
<style>
:root{--red:#e63946;--rd:#c1121f;--gold:#d4a017;--gl:#f0c040;--bg:#0f0f0f;--s1:#1a1a1a;--s2:#242424;--bdr:#2e2e2e;--txt:#f0f0f0;--mut:#777;--av:#e63946;--em:#4a9eca;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:var(--bg);color:var(--txt);}
header{background:linear-gradient(135deg,#1a0a04,#2c1206,#1a0804);border-bottom:1px solid #3d1f0a;padding:0 40px;display:flex;align-items:center;gap:24px;min-height:90px;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(230,57,70,.08),transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(212,160,23,.05),transparent 60%);pointer-events:none;}
header img{height:68px;width:68px;border-radius:50%;border:2px solid var(--gold);box-shadow:0 0 20px rgba(212,160,23,.35),0 0 40px rgba(212,160,23,.1);flex-shrink:0;position:relative;z-index:1;}
.ht{position:relative;z-index:1;}.ht h1{font-size:1.55rem;font-weight:900;letter-spacing:-.02em;color:#fff;}.ht h1 span{color:var(--gl);}.ht p{font-size:.78rem;color:var(--mut);margin-top:5px;letter-spacing:.06em;text-transform:uppercase;}
.hr{margin-left:auto;text-align:right;position:relative;z-index:1;}.dot{display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:50%;margin-right:6px;box-shadow:0 0 8px #22c55e;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}.hr .lv{font-size:.73rem;color:var(--mut);}.hr .dt{font-size:.9rem;color:#ccc;font-weight:700;margin-top:5px;}
.wrap{max-width:1240px;margin:0 auto;padding:28px 20px;}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:22px 20px 18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,var(--red));border-radius:14px 14px 0 0;transform:scaleX(0);transform-origin:left;transition:transform .25s;}
.sc:hover{border-color:#444;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.5);}.sc:hover::after,.sc.active::after{transform:scaleX(1);}
.sc.active{border-color:var(--c,var(--red));box-shadow:0 0 0 1px var(--c,var(--red));background:#1f1f1f;}
.sc .ico{font-size:1.3rem;margin-bottom:10px;}.sc .num{font-size:2.8rem;font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--c,var(--red));}.sc .lbl{font-size:.7rem;color:var(--mut);margin-top:7px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}.sc .hint{font-size:.63rem;color:#444;margin-top:4px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}.fw{grid-column:1/-1;}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:22px 24px;}.ct{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:18px;}
.br{display:flex;align-items:center;gap:12px;margin-bottom:9px;}.bl{min-width:60px;text-align:right;color:var(--mut);white-space:nowrap;font-size:.73rem;}.bw{flex:1;background:var(--s2);border-radius:5px;height:22px;overflow:hidden;}.bf{height:22px;border-radius:5px;display:flex;align-items:center;padding:0 10px;color:rgba(255,255,255,.85);font-size:.72rem;font-weight:700;min-width:6px;}.bn{min-width:28px;color:var(--txt);font-weight:700;font-size:.8rem;}
.pill{display:inline-block;border-radius:5px;padding:3px 8px;font-size:.7rem;font-weight:700;white-space:nowrap;}
.po{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.25);}.pg{background:rgba(156,163,175,.1);color:#9ca3af;border:1px solid rgba(156,163,175,.2);}.pr{background:rgba(230,57,70,.12);color:#f87171;border:1px solid rgba(230,57,70,.25);}.py{background:rgba(234,179,8,.1);color:#facc15;border:1px solid rgba(234,179,8,.2);}.pgg{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25);}
.ra{color:var(--av);font-weight:700;}.re{color:var(--em);font-weight:700;}
table{width:100%;border-collapse:collapse;font-size:.81rem;}th{background:var(--s2);color:var(--mut);font-weight:700;font-size:.67rem;text-transform:uppercase;letter-spacing:.07em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--bdr);}td{padding:10px 14px;border-bottom:1px solid #1d1d1d;}tbody tr:hover td{background:var(--s2);}tbody tr:last-child td{border-bottom:none;}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}.filters select,.filters input{background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:.79rem;color:var(--txt);outline:none;}.filters input[type=text]{width:190px;}
.cbtn{background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px;font-size:.77rem;cursor:pointer;color:var(--mut);transition:all .15s;}.cbtn:hover{border-color:var(--red);color:var(--red);}
.db{background:rgba(212,160,23,.07);border:1px solid rgba(212,160,23,.2);border-radius:8px;padding:9px 14px;margin-bottom:14px;font-size:.8rem;color:var(--gl);display:none;}.db.on{display:block;}
.badge{background:var(--red);color:#fff;border-radius:5px;font-size:.65rem;padding:2px 8px;margin-left:8px;font-weight:800;vertical-align:middle;}.foot{font-size:.7rem;color:#333;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr);}
</style>
</head>

const SC={'Contacted - Follow Up Needed':'po','No Response':'pg','Not Interested':'pr','Not Interested ':'pr','Unqualified Lead':'pg','Interested':'py','Signed Up':'pgg','Agressive NO':'pr'};
function pill(s){return '<span class="pill '+(SC[s]||'pg')+'">'+(s||'—').trim()+'</span>';}
function bar(id,rows,mx,cf){document.getElementById(id).innerHTML=rows.map(([l,n])=>{const w=Math.max(4,Math.round(n/mx*100));return '<div class="br"><div class="bl">'+l+'</div><div class="bw"><div class="bf" style="width:'+w+'%;background:'+cf(l)+'">'+(n>3?n:'')+'</div></div><div class="bn">'+n+'</div></div>';}).join('');}
let ak='';
function drill(tp,val,lbl){rf();if(tp==='date')document.getElementById('fd').value=val;else if(tp==='status')document.getElementById('fs').value=val;ak=tp+':'+val;document.querySelectorAll('.sc').forEach(c=>c.classList.toggle('active',c.dataset.k===ak));const b=document.getElementById('dbb');b.textContent='🔍 '+lbl+' — click ✕ Clear to reset';b.classList.add('on');rt();setTimeout(()=>document.getElementById('tsec').scrollIntoView({behavior:'smooth',block:'start'}),80);}

function rs(){const tn=leads.filter(l=>l.date===TODAY).length,inn=leads.filter(l=>l.status==='Interested').length,sn=leads.filter(l=>l.status==='Signed Up').length;const cards=[{ico:'📞',n:leads.length,l:'Total Contacted',h:'View all',c:'#e63946',k:'all:all',fn:ca},{ico:'⭐',n:tn,l:"Today's Contacts",h:'Click to drill down',c:'#f0c040',k:'date:'+TODAY,fn:()=>drill('date',TODAY,"Today's Contacts — "+TODAY)},{ico:'🤝',n:inn,l:'Interested',h:'Click to drill down',c:'#4a9eca',k:'status:Interested',fn:()=>drill('status','Interested','Interested Leads')},{ico:'✅',n:sn,l:'Signed Up',h:'Click to drill down',c:'#4ade80',k:'status:Signed Up',fn:()=>drill('status','Signed Up','Signed Up 🎉')}];window._ca=cards.map(c=>c.fn);document.getElementById('stats').innerHTML=cards.map((c,i)=>'<div class="sc" data-k="'+c.k+'" style="--c:'+c.c+'" onclick="_ca['+i+']()" title="'+c.h+'"><div class="ico">'+c.ico+'</div><div class="num">'+c.n+'</div><div class="lbl">'+c.l+'</div><div class="hint">'+c.h+'</div></div>').join('');}
function rd(){const m={};leads.forEach(l=>{m[l.date]=(m[l.date]||0)+1;});const rows=Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).slice(-14);const mx=Math.max(...rows.map(x=>x[1]));bar('cd',rows.map(([d,n])=>[d.slice(5)+(d===TODAY?' ★':''),n]),mx,l=>l.includes('★')?'linear-gradient(90deg,#c1121f,#e63946)':'linear-gradient(90deg,#5a0e14,#a02030)');}
function rr(){const m={};leads.forEach(l=>{m[l.owner]=(m[l.owner]||0)+1;});const rows=Object.entries(m).sort((a,b)=>b[1]-a[1]);const mx=Math.max(...rows.map(x=>x[1]));bar('cr',rows,mx,r=>r==='Avern'?'linear-gradient(90deg,#c1121f,#e63946)':'linear-gradient(90deg,#1a5f8a,#4a9eca)');}
function rstat(){const m={};leads.forEach(l=>{const k=(l.status||'Unknown').trim();m[k]=(m[k]||0)+1;});const rows=Object.entries(m).sort((a,b)=>b[1]-a[1]);const mx=Math.max(...rows.map(x=>x[1]));const C={'Contacted - Follow Up Needed':'linear-gradient(90deg,#c2600a,#f4a261)','No Response':'linear-gradient(90deg,#2d3748,#6b7280)','Not Interested':'linear-gradient(90deg,#991b1b,#e63946)','Unqualified Lead':'linear-gradient(90deg,#2d3748,#6b7280)','Interested':'linear-gradient(90deg,#a16207,#eab308)','Signed Up':'linear-gradient(90deg,#15803d,#22c55e)','Agressive NO':'linear-gradient(90deg,#7f1d1d,#dc2626)'};bar('cs',rows,mx,s=>C[s]||'linear-gradient(90deg,#374151,#6b7280)');const sel=document.getElementById('fs');rows.forEach(([s])=>{const o=document.createElement('option');o.value=s;o.textContent=s.trim();sel.appendChild(o);});}
function rperf(){const reps=['Avern','Emmanuel'],sts=['Contacted - Follow Up Needed','Interested','Signed Up','No Response','Not Interested','Unqualified Lead','Agressive NO'],c={};leads.forEach(l=>{if(!c[l.owner])c[l.owner]={};const k=(l.status||'').trim();c[l.owner][k]=(c[l.owner][k]||0)+1;});let h='<table><thead><tr><th>Status</th>'+reps.map(r=>'<th>'+r+'</th>').join('')+'</tr></thead><tbody>';sts.forEach(s=>{h+='<tr><td>'+pill(s)+'</td>';reps.forEach(r=>{const n=(c[r]&&c[r][s.trim()])||0;h+='<td style="font-weight:700;color:'+(n?'var(--txt)':'#333')+'">'+( n||'—')+'</td>';});h+='</tr>';});h+='</tbody></table>';document.getElementById('cp').innerHTML=h;}
function rt(){const rF=document.getElementById('fr').value,sF=document.getElementById('fs').value,dF=document.getElementById('fd').value,qF=document.getElementById('fq').value.toLowerCase();const out=leads.filter(l=>{if(rF&&l.owner!==rF)return false;if(sF&&(l.status||'').trim()!==sF.trim())return false;if(dF&&l.date!==dF)return false;if(qF&&!l.name.toLowerCase().includes(qF))return false;return true;}).sort((a,b)=>b.date.localeCompare(a.date));document.getElementById('tb').innerHTML=out.map(l=>'<tr><td><strong>'+l.name+'</strong></td><td><span class="r'+(l.owner==='Avern'?'a':'e')+'">'+l.owner+'</span></td><td>'+pill(l.status)+'</td><td style="color:var(--mut)">'+(l.county||'—')+'</td><td style="color:#555;font-size:.77rem">'+(l.email||'—')+'</td><td style="color:#555;font-size:.77rem">'+(l.phone||'—')+'</td><td style="color:#444;font-size:.77rem">'+l.date+'</td></tr>').join('');document.getElementById('tbadge').textContent=out.length;document.getElementById('tf').textContent='Showing '+out.length+' of '+leads.length+' contacted leads';}
